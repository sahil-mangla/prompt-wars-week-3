name: HabitLoop CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  # ─── Frontend Lint & Build ────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # ─── Docker Build & Push (main branch only) ───────────────────────────────
  docker-deploy:
    name: Docker Build & Push
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/habitloop:${{ github.sha }} .
          docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/habitloop:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT_ID }}/habitloop:latest

      - name: Push to Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/habitloop:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/habitloop:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy habitloop \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/habitloop:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --set-secrets GEMINI_API_KEY=gemini-api-key:latest \
            --set-env-vars NODE_ENV=production \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --allow-unauthenticated \
            --quiet

      - name: Output Cloud Run URL
        run: |
          URL=$(gcloud run services describe habitloop --platform managed --region us-central1 --format 'value(status.url)')
          echo "🌱 HabitLoop deployed to: $URL"
          echo "DEPLOYMENT_URL=$URL" >> $GITHUB_ENV
